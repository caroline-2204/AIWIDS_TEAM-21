# Inference server configuration

api:
  host: 0.0.0.0  # Listen on all interfaces
  port: 8000  # Server port
  debug: false  # Debug mode (set to true for development)
  threaded: true  # Enable multi-threading

model:
  path: data/models/wifi_ids_model.pt  # Trained model file
  type: mlp  # Model architecture (mlp, cnn, lstm)
  data_dir: data/processed  # Directory with preprocessing objects

logging:
  level: INFO  # Logging level (DEBUG, INFO, WARNING, ERROR)
  file: logs/inference_server.log  # Log file path
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

performance:
  batch_size: 32  # Batch size for inference
  timeout: 5  # Request timeout in seconds
