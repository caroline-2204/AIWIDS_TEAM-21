<!DOCTYPE html>
<html>
<head>
    <title>AI-WIDS Live Dashboard</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: #eee; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; text-align: center; }
        .status-live { width: 12px; height: 12px; border-radius: 50%; background: #2ed573; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1a1f3a; border-radius: 10px; padding: 20px; }
        .stat-box { display: flex; justify-content: space-between; padding: 10px; background: #0f1729; border-radius: 5px; margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2c3e50; }
        .type-evil { color: #ff4757; font-weight: bold; }
        .type-normal { color: #2ed573; }
        .alert { background: #ff4757; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ AI-WIDS Live Dashboard</h1>
        <p><span class="status-live"></span> System Active</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>📊 Statistics</h2>
            <div class="stat-box"><span>Total Packets</span><span id="total">0</span></div>
            <div class="stat-box"><span style="color:#ff4757">Evil Twin</span><span id="evil">0</span></div>
            <div class="stat-box"><span style="color:#2ed573">Normal</span><span id="normal">0</span></div>
            <div class="stat-box"><span>Unique SSIDs</span><span id="ssids">0</span></div>
        </div>
        <div class="card">
            <h2>🚨 Recent Alerts</h2>
            <div id="alerts-list"></div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h2>🌐 Detected Networks</h2>
            <table>
                <thead>
                    <tr>
                        <th>SSID</th>
                        <th>Type</th>
                        <th>AI Evil Prob</th>
                        <th>Confidence</th>
                    </tr>
                </thead>
                <tbody id="networks"></tbody>
            </table>
        </div>
    </div>
    <script>
        const socket = io();
        socket.on('stats', (data) => {
            document.getElementById('total').textContent = data.total_packets;
            document.getElementById('evil').textContent = data.evil_twin_packets;
            document.getElementById('normal').textContent = data.normal_packets;
            document.getElementById('ssids').textContent = data.unique_ssids;
        });
        socket.on('networks', (data) => {
            const tbody = document.getElementById('networks');
            tbody.innerHTML = data.map(net => `
                <tr>
                    <td>${net.ssid}</td>
                    <td class="${net.type.includes('EVIL') ? 'type-evil' : 'type-normal'}">${net.type}</td>
                    <td style="color: ${net.evil_prob > 50 ? '#ff4757' : '#aaa'}">${net.evil_prob.toFixed(1)}%</td>
                    <td>${net.confidence.toFixed(1)}%</td>
                </tr>`).join('');
        });
        socket.on('alert', (data) => {
            const div = document.getElementById('alerts-list');
            div.innerHTML = `<div class="alert"><strong>${data.type}</strong><br>${data.ssid} (${data.time})</div>` + div.innerHTML;
        });
    </script>
</body>
</html>
